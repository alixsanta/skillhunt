# Infrastructure de développement local — SkillHunt
# Pour l'instant : PostgreSQL + PostGIS (SH-6) + LocalStack/S3 (SH-31). MongoDB, Redis et
# les services applicatifs seront ajoutés lors de la dockerisation complète (SH-2).
#
# Démarrer :  docker compose up -d
# Les identifiants sont volontairement ceux de DEV (à surcharger par .env en staging/prod).

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: skillhunt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-skillhunt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skillhunt}
      POSTGRES_DB: ${DB_NAME:-skillhunt}
    ports:
      # Port HÔTE 5433 par défaut pour éviter un conflit avec un PostgreSQL déjà installé sur 5432.
      # (Le port INTERNE du conteneur reste 5432.)
      - "${DB_PORT:-5433}:5432"
    volumes:
      - skillhunt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-skillhunt} -d ${DB_NAME:-skillhunt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stockage objet S3 émulé en local (SH-31) — aucun compte AWS requis en dev/test.
  # Permet de développer/tester l'upload de certifications (SH-10) et médias (SH-17)
  # sans coût cloud, et de garder la CI hermétique.
  localstack:
    image: localstack/localstack:3
    container_name: skillhunt-localstack
    restart: unless-stopped
    environment:
      # On n'active que S3 : surface minimale, démarrage rapide.
      SERVICES: s3
      # Identifiants de DEV factices (LocalStack ignore leur valeur réelle).
      AWS_DEFAULT_REGION: ${AWS_REGION:-eu-west-3}
    ports:
      # Edge port unique de LocalStack (toutes les API S3 passent par 4566).
      - "${AWS_S3_PORT:-4566}:4566"
    volumes:
      - skillhunt_localstack:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  skillhunt_pgdata:
  skillhunt_localstack:
