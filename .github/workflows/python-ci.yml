name: SkillHunt - CI FastAPI Matching Service

# Déclencheurs optimisés pour l'architecture Monorepo : s'exécute uniquement si des modifications
# ont lieu dans le sous-dossier matching-service/ ou sur ce fichier de workflow
on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'matching-service/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'matching-service/**'
      - '.github/workflows/python-ci.yml'

jobs:
  validation-python:
    name: Validation de la Base de Code FastAPI
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: skillhunt
          POSTGRES_PASSWORD: skillhunt
          POSTGRES_DB: skillhunt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillhunt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Étape 1 : Récupérer le code source du dépôt global
      - name: 📥 Récupération du code source
        uses: actions/checkout@v4

      # Étape 2 : Configurer l'environnement Python (v3.11 LTS pour la robustesse et PostGIS)
      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            matching-service/requirements.txt
            matching-service/requirements-dev.txt

      # Étape 3 : Installer pip, les dépendances de l'application et les outils de test/qualité
      - name: 📦 Installation des dépendances et outils de validation
        run: |
          python -m pip install --upgrade pip
          pip install -r matching-service/requirements.txt
          pip install -r matching-service/requirements-dev.txt

      # Étape 4 : Analyse de sécurité statique (Compétence C2.2.3 - Sécurité OWASP)
      - name: 🛡️ Audit de sécurité statique du code (Bandit)
        run: |
          # Bandit analyse le code Python pour traquer les failles (injections, eval(), assert...)
          # -r : récursif, -x : exclure les tests, -ll : n'affiche que les alertes moyennes et hautes
          bandit -r matching-service/ -x matching-service/tests/ -ll
        continue-on-error: true # Permet de loguer les failles sans bloquer complètement la compilation au début

      # Étape 5 : Linter Python - Validation du style (Compétence C2.1.2 - PEP 8)
      - name: 🔍 Analyse statique du style (Flake8 - PEP8)
        run: |
          # Vérifie la conformité du code avec les standards du langage (PEP 8)
          # Étape 5a : Échoue s'il y a des erreurs de syntaxe, de typage ou des variables indéfinies
          flake8 matching-service/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Étape 5b : Avertit sans bloquer pour les légers défauts cosmétiques (complexité, longueur des lignes)
          flake8 matching-service/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Étape 6 : Lancer les tests unitaires et de matching géospatial (Compétence C2.2.2 - Harnais de test)
      - name: 🧪 Exécution des tests unitaires et couverture (PyTest)
        env:
          DATABASE_URL: postgresql+asyncpg://skillhunt:skillhunt@localhost:5432/skillhunt_test
        run: |
          cd matching-service
          if [ -d tests ]; then
            pytest --cov=. --cov-report=xml tests/
          else
            echo "Aucun dossier de test détecté pour le moment."
          fi